apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service
  namespace: shoptik
  labels:
    app.kubernetes.io/name: go-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shoptik
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: go-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-service
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: go
          image: swaruptappn/shoptik-go:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
            - name: grpc
              containerPort: 5003
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: "5002"
            - name: GRPC_PORT
              value: "5003"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: MONGO_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: MONGO_DB
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: REDIS_PASSWORD
            - name: MONGO_URI
              value: >-
                mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@mongodb:27017/$(MONGO_DB)?authSource=admin
            - name: REDIS_URL
              value: >-
                redis://:$(REDIS_PASSWORD)@redis:6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
