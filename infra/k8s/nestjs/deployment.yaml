apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-service
  namespace: shoptik
  labels:
    app.kubernetes.io/name: nestjs-service
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: shoptik
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nestjs-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nestjs-service
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: nestjs
          image: swaruptappn/shoptik-nestjs:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: PORT
              value: "5001"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: POSTGRES_DB
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shoptik-db-secrets
                  key: REDIS_PASSWORD
            - name: DB_URL
              value: >-
                postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              value: >-
                redis://:$(REDIS_PASSWORD)@redis:6379
            - name: GRPC_SERVICE_URL
              value: "go-service:5003"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: nestjs-config
                  key: CORS_ORIGINS
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nestjs-config
                  key: NODE_ENV
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
