# ============================================================================
# Infrastructure Only Docker Compose
# Use this for running databases and admin tools locally during development
# ============================================================================

name: 'shoptik-infra'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: shoptik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shoptik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoptik_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-shoptik_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shoptik} -d ${POSTGRES_DB:-shoptik_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongo:
    image: mongo:8
    container_name: shoptik-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secret_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-shoptik}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:latest
    container_name: shoptik-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mongo Express (MongoDB Web UI)
  mongo-express:
    image: mongo-express:latest
    container_name: shoptik-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secret_password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-mongo_secret_password}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express_secret_password}
    ports:
      - "8081:8081"
    networks:
      - shoptik-network
    depends_on:
      mongo:
        condition: service_healthy

  # RedisInsight (Redis Web UI)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: shoptik-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - shoptik-network
    depends_on:
      redis:
        condition: service_healthy

  # pgAdmin (PostgreSQL Web UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shoptik-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@shoptik.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_secret_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - shoptik-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  shoptik-network:
    driver: bridge
