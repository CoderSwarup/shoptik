name: 'shoptik-dev'

services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: shoptik-postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shoptik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-shoptik_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shoptik} -d ${POSTGRES_DB:-shoptik_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongo:
    image: mongo:8
    container_name: shoptik-mongo
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-dev_mongo_password_123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-shoptik}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:latest
    container_name: shoptik-redis
    restart: unless-stopped
    env_file:
      - .env.dev
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_redis_password_123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mongo Express (MongoDB Web UI)
  mongo-express:
    image: mongo-express:latest
    container_name: shoptik-mongo-express
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-dev_mongo_password_123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-dev_mongo_password_123}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-dev_express_password_123}
    ports:
      - "8081:8081"
    networks:
      - shoptik-network
    depends_on:
      mongo:
        condition: service_healthy

  # RedisInsight (Redis Web UI)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: shoptik-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - shoptik-network
    depends_on:
      redis:
        condition: service_healthy

  # pgAdmin (PostgreSQL Web UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shoptik-pgadmin
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@shoptik.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-dev_pgadmin_password_123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - shoptik-network
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================================
  # Application Services (Development with Hot Reload)
  # ============================================================================

  # Go Service (Development)
  go-service:
    build:
      context: ../apps/go-service
      dockerfile: docker/Dockerfile.dev
    container_name: shoptik-go-dev
    restart: unless-stopped
    env_file:
      - ../apps/go-service/.env
    environment:
      - HTTP_PORT=5002
      - GRPC_PORT=5003
      - MONGO_URI=mongodb://admin:${MONGO_ROOT_PASSWORD:-dev_mongo_password_123}@mongo:27017/shoptik?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_123}@redis:6379
    ports:
      - "5002:5002"
      - "5003:5003"
    volumes:
      - ../apps/go-service:/app
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    networks:
      - shoptik-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # NestJS Service (Development)
  nestjs-service:
    build:
      context: ../apps/nestjs-service
      dockerfile: docker/Dockerfile.dev
    container_name: shoptik-nestjs-dev
    restart: unless-stopped
    env_file:
      - ../apps/nestjs-service/.env
    environment:
      - PORT=5001
      - DB_URL=postgresql://shoptik:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/shoptik_db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - GRPC_SERVICE_URL=go-service:5003
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_password_123}@redis:6379
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "5001:5001"
    volumes:
      - ../apps/nestjs-service/src:/app/src
      - ../apps/nestjs-service/test:/app/test
      - ../apps/nestjs-service/package.json:/app/package.json
      - ../apps/nestjs-service/tsconfig.json:/app/tsconfig.json
      - ../apps/nestjs-service/nest-cli.json:/app/nest-cli.json
      - ../packages/proto:/packages/proto
    networks:
      - shoptik-network
    depends_on:
      postgres:
        condition: service_healthy
      go-service:
        condition: service_started
      redis:
        condition: service_healthy

  # Web - Next.js (Development)
  web:
    build:
      context: ../apps/web
      dockerfile: docker/Dockerfile.dev
    container_name: shoptik-web-dev
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web/app:/app/app
      - ../apps/web/components:/app/components
      - ../apps/web/lib:/app/lib
      - ../apps/web/hooks:/app/hooks
      - ../apps/web/services:/app/services
      - ../apps/web/config:/app/config
      - ../apps/web/public:/app/public
      - ../apps/web/package.json:/app/package.json
      - ../apps/web/next.config.mjs:/app/next.config.mjs
      - ../apps/web/tsconfig.json:/app/tsconfig.json
    networks:
      - shoptik-network
    depends_on:
      nestjs-service:
        condition: service_started

volumes:
  # Infrastructure volumes
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  pgadmin_data:
    driver: local

  # Go development cache volumes
  go-build-cache:
    driver: local
  go-mod-cache:
    driver: local

networks:
  shoptik-network:
    driver: bridge
