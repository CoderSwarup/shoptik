name: 'shoptik-prod'

services:
  # ============================================================================
  # Infrastructure Services (Production)
  # ============================================================================

  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: shoptik-postgres-prod
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shoptik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-shoptik_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shoptik} -d ${POSTGRES_DB:-shoptik_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # MongoDB Database
  mongo:
    image: mongo:8
    container_name: shoptik-mongo-prod
    restart: always
    env_file:
      - .env.prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-shoptik}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shoptik-redis-prod
    restart: always
    env_file:
      - .env.prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shoptik-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # Application Services (Production Builds)
  # ============================================================================

  # Go Service (Production)
  go-service:
    build:
      context: ../apps/go-service
      dockerfile: docker/Dockerfile.prod
      args:
        VERSION: ${BUILD_VERSION:-latest}
        BUILD_DATE: ${BUILD_DATE}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: shoptik-go-prod
    restart: always
    env_file:
      - ../apps/go-service/.env
    environment:
      - HTTP_PORT=5002
      - GRPC_PORT=5003
      - MONGO_URI=mongodb://admin:${MONGO_ROOT_PASSWORD}@mongo:27017/shoptik?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "5002:5002"
      - "5003:5003"
    volumes:
      - go-logs:/app/logs
    networks:
      - shoptik-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # NestJS Service (Production)
  nestjs-service:
    build:
      context: ${PROJECT_ROOT:-/Users/onlymec/Documents/MINE/SHOPTIK}
      dockerfile: apps/nestjs-service/docker/Dockerfile.prod
      args:
        VERSION: ${BUILD_VERSION:-latest}
        BUILD_DATE: ${BUILD_DATE}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: shoptik-nestjs-prod
    restart: always
    env_file:
      - ../apps/nestjs-service/.env
    environment:
      - PORT=5001
      - DB_URL=postgresql://shoptik:${POSTGRES_PASSWORD}@postgres:5432/shoptik_db
      - CORS_ORIGINS=${CORS_ORIGINS:-https://yourdomain.com}
      - GRPC_SERVICE_URL=go-service:5003
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
    ports:
      - "5001:5001"
    volumes:
      - nestjs-logs:/app/logs
    networks:
      - shoptik-network
    depends_on:
      postgres:
        condition: service_started
      go-service:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Web - Next.js (Production)
  web:
    build:
      context: ../apps/web
      dockerfile: docker/Dockerfile.prod
      args:
        VERSION: ${BUILD_VERSION:-latest}
        BUILD_DATE: ${BUILD_DATE}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: shoptik-web-prod
    restart: always
    env_file:
      - ../apps/web/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://nestjs-service:5001
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    volumes:
      - web-logs:/app/logs
    networks:
      - shoptik-network
    depends_on:
      nestjs-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  # Production data volumes
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local

  # Application log volumes
  go-logs:
    driver: local
  nestjs-logs:
    driver: local
  web-logs:
    driver: local

networks:
  shoptik-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
